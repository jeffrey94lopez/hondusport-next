<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Envíos</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="admin.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#111;color:#eee;font-family:Inter,sans-serif;padding:1.5rem}
  h2{color:#C9A84C;letter-spacing:2px;margin-bottom:1rem;font-size:1.1rem}
  table{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:1.5rem}
  th{background:#1a1a1a;padding:.75rem 1rem;text-align:left;font-size:.75rem;letter-spacing:1px;color:#aaa;border-bottom:1px solid #2a2a2a}
  td{padding:.75rem 1rem;border-bottom:1px solid #1e1e1e;vertical-align:middle}
  input,select{background:#1a1a1a;border:1px solid #333;color:#eee;padding:.5rem .75rem;border-radius:6px;font-size:.85rem}
  .btn{padding:.5rem 1rem;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:.8rem}
  .btn-primary{background:#C9A84C;color:#000}.btn-danger{background:#c0392b;color:#fff}.btn-sm{padding:.35rem .7rem;font-size:.75rem}
  .add-row{display:grid;grid-template-columns:2fr 2fr 1fr 1fr 1fr auto;gap:.75rem;padding:1rem;background:#1a1a1a;border-radius:8px;border:1px solid #2a2a2a;align-items:flex-end;margin-bottom:1.5rem}
  label{font-size:.7rem;color:#aaa;margin-bottom:.2rem;display:block}
  .tog{display:inline-block;width:36px;height:20px;background:#333;border-radius:10px;cursor:pointer;position:relative;transition:.2s}
  .tog.on{background:#C9A84C}.tog::after{content:'';width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s}.tog.on::after{left:18px}
  .tog-row{display:flex;align-items:center;gap:1rem;padding:1rem;background:#1a1a1a;border-radius:8px;margin-bottom:1rem;border:1px solid #2a2a2a}
  .toast{position:fixed;bottom:2rem;right:2rem;background:#C9A84C;color:#000;padding:.75rem 1.5rem;border-radius:8px;font-weight:700;font-size:.85rem;z-index:999;display:none}
</style>
</head>
<body>
<div id="admin-loader"><div class="hs-spinner"></div><span>Cargando</span></div>
<h2>🚚 OPCIONES DE ENVÍO</h2>
<div class="tog-row">
  <div class="tog on" id="fs-tog" onclick="toggleFS(this)"></div>
  <div><strong style="font-size:.9rem">Envío gratis activo</strong>
  <p style="font-size:.75rem;opacity:.5;margin-top:2px">Muestra la barra de progreso de envío gratis en el carrito</p></div>
</div>
<div class="add-row">
  <div><label>NOMBRE *</label><input id="nn" placeholder="Envío en Tegucigalpa" style="width:100%"></div>
  <div><label>DESCRIPCIÓN</label><input id="nd" placeholder="Entrega 24-48h" style="width:100%"></div>
  <div><label>TIPO</label><select id="nt" style="width:100%"><option value="delivery">Delivery</option><option value="pickup">Pickup</option></select></div>
  <div><label>COSTO (L.)</label><input id="nc" type="number" value="0" style="width:100%"></div>
  <div><label>DESCUENTO %</label><input id="ndesc" type="number" value="0" style="width:100%"></div>
  <div><button class="btn btn-primary" onclick="add()" style="white-space:nowrap"><i class="fa-solid fa-plus"></i> Agregar</button></div>
</div>
<table><thead><tr><th>NOMBRE</th><th>DESCRIPCIÓN</th><th>TIPO</th><th>COSTO</th><th>DESC%</th><th>ESTADO</th><th></th></tr></thead>
<tbody id="tbody"></tbody></table>
<div class="toast" id="toast"></div>
<script>
const GET_URL='https://webhook.mplasesores.com/webhook/hondusport-products';
const POST_URL='n8n-proxy.php';
let envios=[];

function showLoader(){document.getElementById('admin-loader')?.classList.add('active');}
function hideLoader(){document.getElementById('admin-loader')?.classList.remove('active');}
async function load(){
  showLoader();
  try {
    const r=await fetch(GET_URL + '?t=' + Date.now());const j=await r.json();
    envios=j.data.envios||[];
    const fsActivo=j.data.config?.free_shipping_activo!=='FALSE';
    if(!fsActivo)document.getElementById('fs-tog').classList.remove('on');
    render();
  } finally { hideLoader(); }
}

function render(){
  document.getElementById('tbody').innerHTML=envios.map((e,i)=>`<tr>
    <td><input value="${esc(e.nombre)}" onchange="envios[${i}].nombre=this.value" style="width:150px"></td>
    <td><input value="${esc(e.descripcion||'')}" onchange="envios[${i}].descripcion=this.value" style="width:170px"></td>
    <td><select onchange="envios[${i}].tipo=this.value" style="width:90px"><option value="delivery" ${e.tipo==='delivery'?'selected':''}>Delivery</option><option value="pickup" ${e.tipo==='pickup'?'selected':''}>Pickup</option></select></td>
    <td><input type="number" value="${e.costo||0}" onchange="envios[${i}].costo=parseFloat(this.value)||0" style="width:70px"></td>
    <td><input type="number" value="${e.descuento||0}" onchange="envios[${i}].descuento=parseFloat(this.value)||0" style="width:55px"></td>
    <td><div class="tog ${e.activo!==false?'on':''}" id="et${i}" onclick="this.classList.toggle('on')"></div></td>
    <td style="display:flex;gap:.4rem">
      <button class="btn btn-primary btn-sm" onclick="saveRow(${i})"><i class="fa-solid fa-floppy-disk"></i></button>
      <button class="btn btn-danger btn-sm" onclick="delRow(${i})"><i class="fa-solid fa-trash"></i></button>
    </td></tr>`).join('');
}

async function saveRow(i){
  const e=envios[i];
  const r=await n8n({sheet:'Envios',action:'update',id:e.id,data:{nombre:e.nombre,descripcion:e.descripcion,tipo:e.tipo,costo:e.costo,descuento:e.descuento,activo:document.getElementById(`et${i}`).classList.contains('on')?'TRUE':'FALSE'}});
  if(r.success)toast('✅ Guardado');else toast('❌ Error');
}

async function delRow(i){
  if(!confirm('¿Eliminar?'))return;
  const r=await n8n({sheet:'Envios',action:'delete',id:envios[i].id});
  if(r.success){toast('✅ Eliminado');load();}
}

async function add(){
  const nombre=document.getElementById('nn').value.trim();
  if(!nombre){toast('❌ Nombre obligatorio');return;}
  const r=await n8n({sheet:'Envios',action:'create',data:{nombre,descripcion:document.getElementById('nd').value,tipo:document.getElementById('nt').value,costo:parseFloat(document.getElementById('nc').value)||0,descuento:parseFloat(document.getElementById('ndesc').value)||0,activo:'TRUE'}});
  if(r.success){toast('✅ Agregado');load();}else toast('❌ Error');
}

async function toggleFS(el){
  el.classList.toggle('on');
  const v=el.classList.contains('on')?'TRUE':'FALSE';
  await n8n({sheet:'Configuracion',action:'update',id:'free_shipping_activo',data:{value:v}});
  toast(`✅ Envío gratis ${v==='TRUE'?'activado':'desactivado'}`);
}

async function n8n(body){const r=await fetch(POST_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}
function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
load();
</script>
</body>
</html>
