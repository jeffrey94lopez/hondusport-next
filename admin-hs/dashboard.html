<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hondusport Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0f0f0f;color:#eee;font-family:Inter,sans-serif;display:flex;min-height:100vh}
  .sidebar{width:220px;background:#141414;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;padding:1.5rem 0;position:fixed;height:100vh}
  .brand{padding:0 1.5rem 1.5rem;border-bottom:1px solid #2a2a2a;margin-bottom:1rem}
  .brand h2{color:#C9A84C;font-size:1.1rem;letter-spacing:2px}
  .brand p{font-size:.7rem;opacity:.4;margin-top:2px}
  .nav-item{display:flex;align-items:center;gap:12px;padding:.75rem 1.5rem;color:rgba(255,255,255,.6);text-decoration:none;font-size:.9rem;font-weight:600;letter-spacing:.5px;transition:.2s;cursor:pointer;border:none;background:none;width:100%;text-align:left}
  .nav-item:hover,.nav-item.active{color:#C9A84C;background:rgba(201,168,76,.08)}
  .nav-item i{width:18px;text-align:center;font-size:.95rem}
  .sidebar-footer{margin-top:auto;padding:1rem 1.5rem;border-top:1px solid #2a2a2a}
  .main{margin-left:220px;flex:1}
  iframe{border:none;width:100%;height:100vh}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="brand"><h2>HONDUSPORT</h2><p>PANEL ADMIN</p></div>
  <button class="nav-item active" onclick="loadSection('productos',this)"><i class="fa-solid fa-box"></i> Productos</button>
  <button class="nav-item" onclick="loadSection('filtros',this)"><i class="fa-solid fa-tags"></i> Categorías & Tallas</button>
  <button class="nav-item" onclick="loadSection('envios',this)"><i class="fa-solid fa-truck"></i> Envíos</button>
  <button class="nav-item" onclick="loadSection('cupones',this)"><i class="fa-solid fa-ticket"></i> Cupones</button>
  <button class="nav-item" onclick="loadSection('banners',this)"><i class="fa-solid fa-image"></i> Banners</button>
  <div class="sidebar-footer">
    <a class="nav-item" href="logout.php"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
  </div>
</aside>
<main class="main">
  <iframe id="frame" src="productos.html"></iframe>
</main>
<script>
function loadSection(name, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('frame').src = name + '.html';
}
</script>
</body>
</html>
