<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cupones</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#111;color:#eee;font-family:Inter,sans-serif;padding:1.5rem}
  h2{color:#C9A84C;letter-spacing:2px;margin-bottom:1rem;font-size:1.1rem}
  table{width:100%;border-collapse:collapse;font-size:.85rem;margin-bottom:1.5rem}
  th{background:#1a1a1a;padding:.75rem 1rem;text-align:left;font-size:.75rem;letter-spacing:1px;color:#aaa;border-bottom:1px solid #2a2a2a}
  td{padding:.75rem 1rem;border-bottom:1px solid #1e1e1e;vertical-align:middle}
  input{background:#1a1a1a;border:1px solid #333;color:#eee;padding:.5rem .75rem;border-radius:6px;font-size:.85rem}
  .btn{padding:.5rem 1rem;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:.8rem}
  .btn-primary{background:#C9A84C;color:#000}.btn-secondary{background:#2a2a2a;color:#eee}.btn-danger{background:#c0392b;color:#fff}.btn-sm{padding:.35rem .7rem;font-size:.75rem}
  .add-row{display:grid;grid-template-columns:1fr 1fr auto;gap:.75rem;padding:1rem;background:#1a1a1a;border-radius:8px;border:1px solid #2a2a2a;align-items:flex-end;margin-bottom:1.5rem}
  label{font-size:.7rem;color:#aaa;margin-bottom:.2rem;display:block}
  .ba{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700;background:rgba(39,174,96,.2);color:#27AE60}
  .bi{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:700;background:rgba(192,57,43,.2);color:#c0392b}
  .tog-row{display:flex;align-items:center;gap:1rem;padding:1rem;background:#1a1a1a;border-radius:8px;margin-bottom:1rem;border:1px solid #2a2a2a}
  .tog{display:inline-block;width:36px;height:20px;background:#333;border-radius:10px;cursor:pointer;position:relative;transition:.2s}
  .tog.on{background:#C9A84C}.tog::after{content:'';width:16px;height:16px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:.2s}.tog.on::after{left:18px}
  .toast{position:fixed;bottom:2rem;right:2rem;background:#C9A84C;color:#000;padding:.75rem 1.5rem;border-radius:8px;font-weight:700;font-size:.85rem;z-index:999;display:none}
</style>
</head>
<body>
<h2>🎟️ CUPONES DE DESCUENTO</h2>
<div class="tog-row">
  <div class="tog on" id="pp-tog" onclick="togglePopup(this)"></div>
  <div><strong style="font-size:.9rem">Popup de cupones activo</strong>
  <p style="font-size:.75rem;opacity:.5;margin-top:2px">Muestra el popup cuando el usuario intenta salir</p></div>
</div>
<div class="add-row">
  <div><label>CÓDIGO</label><input id="nc" placeholder="VERANO20" style="text-transform:uppercase;width:100%"></div>
  <div><label>DESCUENTO %</label><input id="nd" type="number" value="10" style="width:100%"></div>
  <div><button class="btn btn-primary" onclick="add()"><i class="fa-solid fa-plus"></i> Agregar</button></div>
</div>
<table><thead><tr><th>CÓDIGO</th><th>DESCUENTO</th><th>ESTADO</th><th></th></tr></thead>
<tbody id="tbody"></tbody></table>
<div class="toast" id="toast"></div>
<script>
const GET_URL='https://webhook.mplasesores.com/webhook/hondusport-products';
const POST_URL='https://webhook.mplasesores.com/webhook/hondusport-admin';
let cupones=[];

async function load(){
  const r=await fetch(GET_URL);const j=await r.json();
  cupones=j.data.cupones||[];
  const pa=j.data.config?.cupones_popup_activo!=='FALSE';
  if(!pa)document.getElementById('pp-tog').classList.remove('on');
  render();
}

function render(){
  document.getElementById('tbody').innerHTML=cupones.map((c,i)=>`<tr>
    <td><strong>${esc(c.codigo)}</strong></td>
    <td>${c.descuento}%</td>
    <td><span class="${c.activo!==false?'ba':'bi'}">${c.activo!==false?'ACTIVO':'INACTIVO'}</span></td>
    <td style="display:flex;gap:.4rem">
      <button class="btn btn-secondary btn-sm" onclick="toggle(${i})">${c.activo!==false?'Desactivar':'Activar'}</button>
      <button class="btn btn-danger btn-sm" onclick="del(${i})"><i class="fa-solid fa-trash"></i></button>
    </td></tr>`).join('');
}

async function toggle(i){
  const c=cupones[i],v=c.activo===false?'TRUE':'FALSE';
  const r=await n8n({sheet:'Cupones',action:'update',id:c.codigo,data:{activo:v}});
  if(r.success){toast('✅ Actualizado');load();}
}

async function del(i){
  if(!confirm('¿Eliminar?'))return;
  const r=await n8n({sheet:'Cupones',action:'delete',id:cupones[i].codigo});
  if(r.success){toast('✅ Eliminado');load();}
}

async function add(){
  const codigo=document.getElementById('nc').value.toUpperCase().trim();
  if(!codigo){toast('❌ Código obligatorio');return;}
  const r=await n8n({sheet:'Cupones',action:'create',data:{codigo,descuento:parseInt(document.getElementById('nd').value)||10,tipo:'porcentaje',activo:'TRUE'}});
  if(r.success){toast('✅ Creado');load();}
}

async function togglePopup(el){
  el.classList.toggle('on');
  const v=el.classList.contains('on')?'TRUE':'FALSE';
  await n8n({sheet:'Configuracion',action:'update',id:'cupones_popup_activo',data:{value:v}});
  toast(`✅ Popup ${v==='TRUE'?'activado':'desactivado'}`);
}

async function n8n(body){const r=await fetch(POST_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}
function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',3000);}
load();
</script>
</body>
</html>
