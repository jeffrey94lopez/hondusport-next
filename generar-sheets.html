<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generar Plantilla Hondusport</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  body { font-family: Arial, sans-serif; background: #0f0f0f; color: #eee; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 2.5rem; text-align: center; max-width: 480px; }
  h1 { color: #C9A84C; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 0.5rem; }
  p { opacity: 0.6; font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6; }
  button { background: #C9A84C; color: #000; border: none; padding: 1rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
  button:hover { opacity: 0.85; }
  .nota { font-size: 0.75rem; opacity: 0.4; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="box">
  <h1>HONDUSPORT</h1>
  <p>Haz clic para generar la plantilla Excel con todas las hojas preconfiguradas.<br>Luego súbela a Google Sheets y completa tus datos.</p>
  <button onclick="generarExcel()">⬇ Descargar Plantilla.xlsx</button>
  <p class="nota">Incluye: Productos · Envios · Filtros · Configuracion · Cupones · Banners · Guia</p>
</div>

<script>
function generarExcel() {
  const wb = XLSX.utils.book_new();

  // ─── PRODUCTOS ───
  const productos = [
    ['id','nombre','precio','precio_original','stock','cat','genero','badge','descripcion','personalizable','oferta_fin','rating','imagenes','activo'],
    [1,'Camiseta Real Madrid Local 24/25',599,'',10,'Camisetas','Hombre','Nuevo','Camiseta oficial de la temporada 2024/25','FALSE','',5,'','TRUE'],
    [2,'Zapatilla Nike Air Zoom Running',1299,1599,5,'Zapatillas','Unisex','Oferta','Zapatilla para running con amortiguación Air Zoom','FALSE','',5,'','TRUE'],
    [3,'Short deportivo Dri-FIT',349,'',20,'Ropa','Hombre','','Short con tecnología Dri-FIT para mayor comodidad','FALSE','',5,'','TRUE'],
  ];
  const wsProductos = XLSX.utils.aoa_to_sheet(productos);
  wsProductos['!cols'] = [
    {wch:5},{wch:35},{wch:10},{wch:15},{wch:8},{wch:12},{wch:10},
    {wch:12},{wch:40},{wch:14},{wch:18},{wch:8},{wch:50},{wch:8}
  ];
  // Destacar cabecera
  const rProductos = XLSX.utils.decode_range(wsProductos['!ref']);
  for (let C = rProductos.s.c; C <= rProductos.e.c; C++) {
    const cell = XLSX.utils.encode_cell({r:0, c:C});
    if (!wsProductos[cell]) continue;
    wsProductos[cell].s = { font:{bold:true}, fill:{fgColor:{rgb:'C9A84C'}} };
  }
  XLSX.utils.book_append_sheet(wb, wsProductos, 'Productos');

  // ─── ENVIOS ───
  const envios = [
    ['id','nombre','descripcion','tipo','costo','descuento','activo'],
    [1,'Envío en Tegucigalpa','Entrega en 24-48h','delivery',80,0,'TRUE'],
    [2,'Envío a otras ciudades','Entrega en 3-5 días hábiles','delivery',150,0,'TRUE'],
    [3,'Retiro en tienda','Col. Palmira, Blvd. Morazán — solo L-S 9am-6pm','pickup',0,10,'TRUE'],
  ];
  const wsEnvios = XLSX.utils.aoa_to_sheet(envios);
  wsEnvios['!cols'] = [{wch:5},{wch:25},{wch:45},{wch:10},{wch:8},{wch:12},{wch:8}];
  XLSX.utils.book_append_sheet(wb, wsEnvios, 'Envios');

  // ─── FILTROS ───
  const filtros = [
    ['tipo','valor','categorias','imagen','orden','activo'],
    // Categorías
    ['cat','Camisetas','','',1,'TRUE'],
    ['cat','Zapatillas','','',2,'TRUE'],
    ['cat','Ropa','','',3,'TRUE'],
    ['cat','Accesorios','','',4,'TRUE'],
    // Subcategorías
    ['subcat','Manga Corta','Camisetas','',1,'TRUE'],
    ['subcat','Manga Larga','Camisetas','',2,'TRUE'],
    ['subcat','Running','Zapatillas','',1,'TRUE'],
    ['subcat','Fútbol','Zapatillas','',2,'TRUE'],
    ['subcat','Baloncesto','Zapatillas','',3,'TRUE'],
    // Tallas ropa
    ['talla','XS','Camisetas,Ropa','',1,'TRUE'],
    ['talla','S','Camisetas,Ropa','',2,'TRUE'],
    ['talla','M','Camisetas,Ropa','',3,'TRUE'],
    ['talla','L','Camisetas,Ropa','',4,'TRUE'],
    ['talla','XL','Camisetas,Ropa','',5,'TRUE'],
    ['talla','XXL','Camisetas,Ropa','',6,'TRUE'],
    // Tallas zapatillas
    ['talla','36','Zapatillas','',1,'TRUE'],
    ['talla','37','Zapatillas','',2,'TRUE'],
    ['talla','38','Zapatillas','',3,'TRUE'],
    ['talla','39','Zapatillas','',4,'TRUE'],
    ['talla','40','Zapatillas','',5,'TRUE'],
    ['talla','41','Zapatillas','',6,'TRUE'],
    ['talla','42','Zapatillas','',7,'TRUE'],
    ['talla','43','Zapatillas','',8,'TRUE'],
    ['talla','44','Zapatillas','',9,'TRUE'],
    // Géneros
    ['genero','Hombre','','',1,'TRUE'],
    ['genero','Mujer','','',2,'TRUE'],
    ['genero','Unisex','','',3,'TRUE'],
  ];
  const wsFiltros = XLSX.utils.aoa_to_sheet(filtros);
  wsFiltros['!cols'] = [{wch:10},{wch:15},{wch:25},{wch:45},{wch:8},{wch:8}];
  XLSX.utils.book_append_sheet(wb, wsFiltros, 'Filtros');

  // ─── CONFIGURACION ───
  const config = [
    ['key','value'],
    ['whatsapp_number','50499999999'],
    ['free_shipping_meta','999'],
    ['free_shipping_activo','TRUE'],
    ['free_shipping_msg','✨ ¡TIENES ENVÍO GRATIS!'],
    ['cupones_popup_activo','TRUE'],
    ['stock_bajo_limite','5'],
    ['promo_bar_texto','🚀 Envío GRATIS en compras mayores a L.'],
    ['nombre_negocio','Hondu Sport'],
    ['slogan','Elite Performance & Style'],
    ['logo_url',''],
    ['color_primario','#C9A84C'],
    ['color_bg_light','#F5F5F5'],
    ['color_text_light','#1A1A1A'],
    ['color_card_light','#FFFFFF'],
    ['color_border_light','#E0E0E0'],
    ['color_bg_dark','#0F0F0F'],
    ['color_text_dark','#EEEEEE'],
    ['color_card_dark','#1A1A1A'],
    ['color_border_dark','#2A2A2A'],
    ['color_btn_bg','#C9A84C'],
    ['color_btn_text','#000000'],
    ['color_btn_hover','#B8963B'],
    ['color_badge_oferta','#E74C3C'],
    ['color_badge_nuevo','#27AE60'],
    ['color_badge_eco','#2980B9'],
    ['color_badge_limite','#E67E22'],
    ['telefono_visible','+504 9999-9999'],
    ['email_contacto','info@hondusport.com'],
    ['direccion','Tegucigalpa, Honduras'],
    ['horario','Lun-Sáb 9am-6pm'],
    ['facebook_url',''],
    ['instagram_url',''],
    ['tiktok_url',''],
    ['whatsapp_url',''],
    ['twitter_url',''],
    ['youtube_url',''],
  ];
  const wsConfig = XLSX.utils.aoa_to_sheet(config);
  wsConfig['!cols'] = [{wch:25},{wch:45}];
  XLSX.utils.book_append_sheet(wb, wsConfig, 'Configuracion');

  // ─── CUPONES ───
  const cupones = [
    ['codigo','descuento','tipo','activo'],
    ['BIENVENIDO10',10,'porcentaje','TRUE'],
    ['VERANO20',20,'porcentaje','FALSE'],
    ['HONDU15',15,'porcentaje','TRUE'],
  ];
  const wsCupones = XLSX.utils.aoa_to_sheet(cupones);
  wsCupones['!cols'] = [{wch:18},{wch:12},{wch:12},{wch:8}];
  XLSX.utils.book_append_sheet(wb, wsCupones, 'Cupones');

  // ─── BANNERS ───
  const banners = [
    ['titulo','subtitulo','btn_texto','btn_link','imagen'],
    ['NUEVA TEMPORADA 2025','Los mejores jerseys ya disponibles','VER COLECCIÓN','#tienda',''],
    ['ZAPATILLAS DE RUNNING','Rendimiento al máximo nivel','COMPRAR AHORA','#tienda',''],
    ['ENVÍO GRATIS','En compras mayores a L. 999','VER OFERTAS','#tienda',''],
  ];
  const wsBanners = XLSX.utils.aoa_to_sheet(banners);
  wsBanners['!cols'] = [{wch:35},{wch:40},{wch:18},{wch:15},{wch:50}];
  XLSX.utils.book_append_sheet(wb, wsBanners, 'Banners');

  // ─── GUIA ───
  const guia = [
    ['KEY','DESCRIPCIÓN','VALORES PERMITIDOS','EJEMPLO'],
    ['whatsapp_number','Número para recibir pedidos vía WhatsApp (sin +)','Solo números','50499999999'],
    ['free_shipping_meta','Monto mínimo en L. para activar envío gratis','Número','999'],
    ['free_shipping_activo','Mostrar barra de progreso de envío gratis','TRUE / FALSE','TRUE'],
    ['free_shipping_msg','Mensaje cuando el cliente alcanza el envío gratis','Texto','✨ ¡TIENES ENVÍO GRATIS!'],
    ['cupones_popup_activo','Mostrar popup de cupón cuando el usuario intenta salir','TRUE / FALSE','TRUE'],
    ['stock_bajo_limite','Mostrar alerta "Últimas X unidades" a partir de este stock','Número','5'],
    ['promo_bar_texto','Texto de la barra dorada superior de la página','Texto / HTML','🚀 Envío GRATIS en compras de L.'],
    ['nombre_negocio','Nombre de la tienda (aparece en el título del navegador)','Texto','Hondu Sport'],
    ['slogan','Frase debajo del logo','Texto','Elite Performance & Style'],
    ['logo_url','URL de la imagen del logo','URL pública','https://...logo.png'],
    ['color_primario','Color dorado principal (botones, acentos)','Código hex','#C9A84C'],
    ['color_bg_light','Color de fondo en modo claro','Código hex','#F5F5F5'],
    ['color_text_light','Color de texto en modo claro','Código hex','#1A1A1A'],
    ['color_card_light','Color de tarjetas en modo claro','Código hex','#FFFFFF'],
    ['color_bg_dark','Color de fondo en modo oscuro','Código hex','#0F0F0F'],
    ['color_text_dark','Color de texto en modo oscuro','Código hex','#EEEEEE'],
    ['color_card_dark','Color de tarjetas en modo oscuro','Código hex','#1A1A1A'],
    ['color_badge_oferta','Color del badge "Oferta"','Código hex','#E74C3C'],
    ['color_badge_nuevo','Color del badge "Nuevo"','Código hex','#27AE60'],
    ['color_badge_limite','Color del badge "Últimas unidades"','Código hex','#E67E22'],
    ['telefono_visible','Teléfono que aparece en el footer','Texto','+504 9999-9999'],
    ['email_contacto','Email que aparece en el footer','Email','info@hondusport.com'],
    ['direccion','Dirección física en el footer','Texto','Tegucigalpa, Honduras'],
    ['horario','Horario de atención en el footer','Texto','Lun-Sáb 9am-6pm'],
    ['facebook_url','URL de la página de Facebook','URL completa','https://facebook.com/hondusport'],
    ['instagram_url','URL del perfil de Instagram','URL completa','https://instagram.com/hondusport'],
    ['tiktok_url','URL del perfil de TikTok','URL completa','https://tiktok.com/@hondusport'],
    ['whatsapp_url','URL del botón flotante de WhatsApp','wa.me URL','https://wa.me/50499999999'],
    ['twitter_url','URL del perfil de X/Twitter','URL completa','https://twitter.com/hondusport'],
    ['youtube_url','URL del canal de YouTube','URL completa','https://youtube.com/@hondusport'],
    [''],
    ['⚠️ HOJA ENVIOS — columnas'],
    ['id','Número único por fila','Número','1'],
    ['nombre','Nombre visible al cliente en el checkout','Texto','Envío en Tegucigalpa'],
    ['descripcion','Texto adicional (dirección de retiro, zona cobertura)','Texto','Entrega en 24-48h'],
    ['tipo','Tipo de envío — delivery requiere dirección, pickup no','delivery / pickup','delivery'],
    ['costo','Costo del envío en Lempiras (0 = gratis)','Número','80'],
    ['descuento','Porcentaje de descuento extra por elegir esta opción','Número (0-100)','10'],
    ['activo','Si aparece o no en el checkout','TRUE / FALSE','TRUE'],
    [''],
    ['⚠️ HOJA FILTROS — columnas'],
    ['tipo','Tipo de filtro','cat / subcat / talla / genero','cat'],
    ['valor','Lo que ve el cliente','Texto','S, M, L, Camisetas, 38...'],
    ['categorias','Para tallas y subcats: categorías a las que aplica (separadas por coma)','Texto','Camisetas,Ropa'],
    ['imagen','Solo para tipo=cat: URL de imagen para la galería de categorías','URL pública','https://...jpg'],
    ['orden','Número para controlar el orden de aparición en pantalla','Número','1'],
    ['activo','Si aparece o no en los filtros','TRUE / FALSE','TRUE'],
    [''],
    ['⚠️ HOJA PRODUCTOS — columnas'],
    ['id','Número único por producto (no repetir)','Número','1'],
    ['nombre','Nombre visible en la tienda','Texto','Camiseta Real Madrid'],
    ['precio','Precio de venta actual en Lempiras','Número','599'],
    ['precio_original','Precio antes del descuento (dejar vacío si no hay oferta)','Número o vacío','799'],
    ['stock','Unidades disponibles (vacío = sin límite de stock)','Número o vacío','10'],
    ['cat','Categoría — debe coincidir exactamente con un valor en Filtros tipo=cat','Texto','Camisetas'],
    ['genero','Género del producto','Hombre / Mujer / Unisex o vacío','Hombre'],
    ['badge','Etiqueta especial del producto (dejar vacío para ninguna)','Oferta / Nuevo / Más Vendido / vacío','Oferta'],
    ['descripcion','Descripción larga del producto','Texto','Camiseta oficial...'],
    ['personalizable','Si permite agregar nombre/número bordado','TRUE / FALSE','FALSE'],
    ['oferta_fin','Fecha y hora para el contador de oferta (vacío = sin contador)','Formato: YYYY-MM-DD HH:MM o vacío','2025-12-31 23:59'],
    ['rating','Estrellas del producto (1 a 5)','Número 1-5','5'],
    ['imagenes','URLs de imágenes separadas por coma — generadas desde el panel admin','URLs separadas por coma','https://...jpg,https://...jpg'],
    ['activo','Si aparece en la tienda (FALSE = ocultar sin borrar)','TRUE / FALSE','TRUE'],
  ];
  const wsGuia = XLSX.utils.aoa_to_sheet(guia);
  wsGuia['!cols'] = [{wch:25},{wch:55},{wch:30},{wch:40}];
  XLSX.utils.book_append_sheet(wb, wsGuia, '📖 Guia');

  // ─── Descargar ───
  XLSX.writeFile(wb, 'Hondusport-Plantilla-Sheets.xlsx');

  document.querySelector('button').textContent = '✅ Descargado';
  document.querySelector('button').style.background = '#27AE60';
}
</script>
</body>
</html>
